[project]
name = "kestrel"
version = "0.2.1"
description = "a fast, efficient inference engine for moondream"
readme = "README.md"
requires-python = ">=3.10,<3.14"
dependencies = [
    # torch 2.11 excluded: https://github.com/pytorch/pytorch/issues/178255
    "torch>=2.4,<2.11",
    "tokenizers>=0.15",
    "safetensors>=0.4",
    "torch-c-dlpack-ext>=0.1.3",
    "httpx>=0.27",
    "apache-tvm-ffi>=0.1.5,<0.2",
    "kestrel-native==0.1.3",
    "kestrel-kernels==0.2.1; sys_platform == 'linux'",
    "huggingface-hub>=0.20",
]

[tool.setuptools.packages.find]
include = ["kestrel", "kestrel.*"]
exclude = ["tests", "tests.*"]

[dependency-groups]
dev = [
    "pytest>=8.0",
]
eval = [
    "datasets>=3.0",
    "tqdm>=4.66",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_functions = ["test_*"]
