[project]
name = "kestrel"
version = "0.2.1"
description = "a fast, efficient inference engine for moondream"
readme = "README.md"
requires-python = ">=3.10,<3.14"
dependencies = [
    # torch 2.11 excluded: https://github.com/pytorch/pytorch/issues/178255
    "torch>=2.4,<2.11",
    "tokenizers>=0.15",
    "safetensors>=0.4",
    "torch-c-dlpack-ext>=0.1.3",
    "httpx>=0.27",
    "apache-tvm-ffi>=0.1.5,<0.2",
    "kestrel-native==0.1.4",
    "kestrel-kernels==0.3.0",
    "huggingface-hub>=0.20",
]

[tool.uv]
# kestrel-kernels ships pre-built wheels for Linux x86_64 / aarch64 + Windows
# x86_64 across Python 3.10–3.13, but only cp312 on macOS arm64 (built against
# the macos-14 GitHub runner so the wheel tag is ``macosx_14_0_arm64``).
# Scope uv's environment universe to the combinations that have a wheel —
# without this, ``uv sync`` on macOS arm64 with Python 3.10/3.11/3.13 (or on
# macOS x86_64) errors with "no compatible distribution".
environments = [
    "sys_platform == 'linux'",
    "sys_platform == 'win32'",
    "sys_platform == 'darwin' and platform_machine == 'arm64' and python_version == '3.12'",
]

[tool.setuptools.packages.find]
include = ["kestrel", "kestrel.*"]
exclude = ["tests", "tests.*"]

[dependency-groups]
dev = [
    "pytest>=8.0",
]
eval = [
    "datasets>=3.0",
    "tqdm>=4.66",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_functions = ["test_*"]
